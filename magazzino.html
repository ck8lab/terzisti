<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Magazzino Cartoni</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
html,body{height:100%;margin:0;padding:0;}
body{padding-top:70px;min-height:100%;display:flex;flex-direction:column;}
main{flex:1;background:#f8f9fa;}
.empty-placeholder{text-align:center;color:#aaa;font-size:1.2rem;margin-top:50px;}
table td{vertical-align:middle;}
footer{background:#1a1a1a;color:#fff;text-align:center;padding:1rem;margin-top: auto;}
footer a{color:#ffcc00;text-decoration:none;}
.sortable:hover { cursor: pointer; background-color: #f0f0f0; }
.search-container { max-width: 500px; margin: 0 auto 20px auto; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <a class="btn btn-warning fw-bold shadow-sm px-3" href="index.html">
      <i class="bi bi-house-door-fill"></i> HOME
    </a>
    <div class="d-flex">
      <button class="btn btn-outline-light me-2" data-bs-toggle="modal" data-bs-target="#formModal">Aggiungi</button>
      <button class="btn btn-secondary ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<main class="container mt-4">
  <h2 class="text-center mb-4">MAGAZZINO CARTONI</h2>
  
  <div class="search-container">
    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="text" id="searchInput" class="form-control" placeholder="Cerca per codice o descrizione...">
    </div>
  </div>

  <div id="alert-container"></div>
  
  <div class="table-responsive mt-4">
    <table class="table table-striped table-hover shadow-sm bg-white rounded">
      <thead class="table-dark">
        <tr>
          <th class="sortable" onclick="sortTable('codice')">CODICE <i id="sort-codice" class="bi bi-arrow-down-up ms-1 small"></i></th>
          <th class="sortable" onclick="sortTable('ubicazione')">UBICAZIONE <i id="sort-ubicazione" class="bi bi-arrow-down-up ms-1 small"></i></th>
          <th class="sortable" onclick="sortTable('descrizione')">DESCRIZIONE <i id="sort-descrizione" class="bi bi-arrow-down-up ms-1 small"></i></th>
          <th class="sortable" onclick="sortTable('note')">NOTE <i id="sort-note" class="bi bi-arrow-down-up ms-1 small"></i></th>
          <th class="text-center">AZIONI</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- I dati verranno inseriti qui -->
      </tbody>
    </table>
    <div id="empty-msg" class="empty-placeholder d-none">Nessun dato trovato</div>
  </div>
</main>

<!-- Modal Inserimento / Modifica -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Aggiungi Cartone</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="dataForm">
          <input type="hidden" id="editingId" value="">
          <div class="mb-3">
            <label class="form-label">CODICE</label>
            <input type="text" id="codice" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">UBICAZIONE</label>
            <input type="text" id="ubicazione" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">DESCRIZIONE</label>
            <input type="text" id="descrizione" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">NOTE</label>
            <textarea id="note" class="form-control"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Salva</button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer>
  <p class="mb-0">Sito web realizzato da <a href="https://ck8lab.github.io/kevincellura/" target="_blank">CK8LAB</a></p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getDatabase, ref, get, push, set, remove, onValue } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

// Config Firebase (stessa di index.html)
const firebaseConfig = {
  apiKey: "AIzaSyCpMPomzyMgkmtLgfjvwA_j1zTIz-vpFKA",
  authDomain: "terzisti-2a23f.firebaseapp.com",
  databaseURL: "https://terzisti-2a23f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "terzisti-2a23f",
  storageBucket: "terzisti-2a23f.firebasestorage.app",
  messagingSenderId: "304632997223",
  appId: "1:304632997223:web:0741bb6a9e643d8bacfbc2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const magazzinoRef = ref(db, "magazzino_cartoni");
const statoRef = ref(db, "stato");

let currentData = [];
let sortColumn = 'codice';
let sortDirection = 'asc';

// Nascondi tutto fino a verifica offline
document.documentElement.style.display = "none";

// Controllo modalità offline
get(statoRef).then(snap=>{
  if(snap.exists() && snap.val().attivita === false){
    window.location.href="🖕.html";
  } else {
    document.documentElement.style.display = "block";
  }
}).catch(err=>{
  console.error("Errore nel controllo offline:", err);
  document.documentElement.style.display = "block";
});

// Login obbligatorio
onAuthStateChanged(auth,user=>{
  if(!user) window.location.href="login.html";
});

// Logout
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await signOut(auth);
  window.location.href="login.html";
});

// Alert helper
function showAlert(msg, type="success"){
  const c = document.getElementById("alert-container");
  c.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
  setTimeout(() => { 
    const a = c.querySelector(".alert"); 
    if(a) bootstrap.Alert.getOrCreateInstance(a).close(); 
  }, 5000);
}

// Carica e renderizza tabella
function renderTable(dataToRender) {
  const tbody = document.getElementById("tableBody");
  const emptyMsg = document.getElementById("empty-msg");
  tbody.innerHTML = "";
  
  if (dataToRender.length === 0) {
    emptyMsg.classList.remove("d-none");
    return;
  } else {
    emptyMsg.classList.add("d-none");
  }

  // Ordinamento
  dataToRender.sort((a, b) => {
    let valA = (a[sortColumn] || "").toString().toLowerCase();
    let valB = (b[sortColumn] || "").toString().toLowerCase();
    
    if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
    if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });

  dataToRender.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.codice || ""}</td>
      <td>${item.ubicazione || ""}</td>
      <td>${item.descrizione || ""}</td>
      <td>${item.note || ""}</td>
      <td class="text-center">
        <button class="btn btn-sm btn-warning me-1" onclick="window.editItem('${item.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="window.deleteItem('${item.id}')">🗑</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  
  // Aggiorna icone sort
  document.querySelectorAll('.sortable i').forEach(icon => {
    icon.className = "bi bi-arrow-down-up ms-1 small text-muted";
  });
  const currentSortIcon = document.getElementById(`sort-${sortColumn}`);
  if (currentSortIcon) {
    currentSortIcon.className = `bi bi-arrow-${sortDirection === 'asc' ? 'up' : 'down'} ms-1 small text-primary`;
  }
}

// Listener per aggiornamenti real-time
onValue(magazzinoRef, (snap) => {
  currentData = [];
  if (snap.exists()) {
    const data = snap.val();
    Object.keys(data).forEach(id => {
      if (data[id]) {
        currentData.push({ ...data[id], id });
      }
    });
  }
  filterAndRender();
});

// Filtro e Render
function filterAndRender() {
  const searchInput = document.getElementById("searchInput");
  if (!searchInput) return;
  const search = searchInput.value.toLowerCase().trim();
  const filtered = currentData.filter(item => 
    String(item.codice || "").toLowerCase().includes(search) || 
    String(item.descrizione || "").toLowerCase().includes(search)
  );
  renderTable(filtered);
}

// Event Listeners
document.getElementById("searchInput").addEventListener("input", filterAndRender);

// Funzioni globali per bottoni inline
window.sortTable = (column) => {
  if (sortColumn === column) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = column;
    sortDirection = 'asc';
  }
  filterAndRender();
};

window.editItem = async (id) => {
  const item = currentData.find(d => d.id === id);
  if (!item) return;
  
  document.getElementById("modalTitle").innerText = "Modifica Cartone";
  document.getElementById("editingId").value = id;
  document.getElementById("codice").value = item.codice || "";
  document.getElementById("ubicazione").value = item.ubicazione || "";
  document.getElementById("descrizione").value = item.descrizione || "";
  document.getElementById("note").value = item.note || "";
  
  new bootstrap.Modal(document.getElementById("formModal")).show();
};

window.deleteItem = async (id) => {
  if (confirm("Sei sicuro di voler eliminare questo elemento?")) {
    try {
      await remove(ref(db, `magazzino_cartoni/${id}`));
      showAlert("Elemento eliminato!", "warning");
    } catch (err) {
      showAlert("Errore durante l'eliminazione", "danger");
    }
  }
};

// Salvataggio dati
document.getElementById("dataForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = document.getElementById("editingId").value;
  const payload = {
    codice: document.getElementById("codice").value.trim(),
    ubicazione: document.getElementById("ubicazione").value.trim(),
    descrizione: document.getElementById("descrizione").value.trim(),
    note: document.getElementById("note").value.trim()
  };

  try {
    if (id) {
      await set(ref(db, `magazzino_cartoni/${id}`), payload);
      showAlert("Record aggiornato!");
    } else {
      await push(magazzinoRef, payload);
      showAlert("Record aggiunto!");
    }
    const modal = bootstrap.Modal.getInstance(document.getElementById("formModal"));
    modal.hide();
    e.target.reset();
    document.getElementById("editingId").value = "";
  } catch (err) {
    showAlert("Errore durante il salvataggio", "danger");
  }
});

// Reset modal on close
document.getElementById('formModal').addEventListener('hidden.bs.modal', function () {
  document.getElementById("modalTitle").innerText = "Aggiungi Cartone";
  document.getElementById("editingId").value = "";
  document.getElementById("dataForm").reset();
});

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
