<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home - Gestione Terzisti</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
  :root {
    --primary-color: #0d6efd;
    --secondary-color: #ffcc00;
    --dark-bg: #1a1a1a;
  }
  html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { display: flex; flex-direction: column; background: #f0f2f5; }
  .navbar { background-color: var(--dark-bg) !important; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
  .hero-section {
    background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('curva.webp');
    background-size: cover;
    background-position: center;
    color: white;
    padding: 100px 0;
    text-align: center;
    margin-bottom: 40px;
    border-bottom: 5px solid var(--secondary-color);
  }
  .card-link {
    text-decoration: none;
    color: inherit;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    height: 100%;
    display: block;
  }
  .card-link:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
  }
  .dashboard-card {
    border: none;
    border-radius: 20px;
    overflow: hidden;
    text-align: center;
    padding: 40px 20px;
    background: white;
  }
  .icon-wrapper {
    font-size: 4rem;
    margin-bottom: 20px;
    color: var(--primary-color);
  }
  .card-terzisti .icon-wrapper { color: #ffc107; }
  .card-magazzino .icon-wrapper { color: #0dcaf0; }
  .card-admin .icon-wrapper { color: #6c757d; }
  
  .card-title { font-weight: 700; margin-bottom: 15px; }
  .card-text { color: #666; font-size: 1.1rem; }
  
  footer { background: var(--dark-bg); color: #fff; text-align: center; padding: 1.5rem; margin-top: auto; }
  footer a { color: var(--secondary-color); text-decoration: none; }
  .shadow-text { text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">GESTIONE TERZISTI</a>
    <div class="d-flex">
      <button class="btn btn-outline-light" id="logoutBtn">Logout <i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
</nav>

<div style="margin-top: 56px;">
  <section class="hero-section">
    <div class="container">
      <h1 class="display-4 fw-bold mb-3 shadow-text">Ciao Pa Sei Nel Pannello di Controllo</h1>
      <p class="lead mb-4 shadow-text">Seleziona la sezione per iniziare la gestione</p>
    </div>
  </section>

  <main class="container mb-5 text-center">
    <div class="row justify-content-center g-4">
      <div class="col-md-5">
        <a href="gestione_terzisti.html" class="card-link">
          <div class="card dashboard-card card-terzisti shadow-sm py-5">
            <div class="icon-wrapper">
              <i class="bi bi-people-fill"></i>
            </div>
            <h2 class="card-title display-5">TERZISTI</h2>
            <p class="card-text fs-4">Gestione ODL e produzione</p>
            <div class="mt-4">
              <span class="btn btn-warning btn-lg px-5 py-3 rounded-pill fw-bold shadow">ENTRA <i class="bi bi-chevron-right"></i></span>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-5">
        <a href="magazzino.html" class="card-link">
          <div class="card dashboard-card card-magazzino shadow-sm py-5">
            <div class="icon-wrapper">
              <i class="bi bi-box-seam-fill"></i>
            </div>
            <h2 class="card-title display-5">MAGAZZINO</h2>
            <p class="card-text fs-4">Gestione cartoni e ubicazioni</p>
            <div class="mt-4">
              <span class="btn btn-info text-white btn-lg px-5 py-3 rounded-pill fw-bold shadow">ENTRA <i class="bi bi-chevron-right"></i></span>
            </div>
          </div>
        </a>
      </div>
    </div>
  </main>
</div>

<footer>
  <p class="mb-0">Sito web realizzato da <a href="https://ck8lab.github.io/kevincellura/" target="_blank">CK8LAB</a></p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCpMPomzyMgkmtLgfjvwA_j1zTIz-vpFKA",
  authDomain: "terzisti-2a23f.firebaseapp.com",
  databaseURL: "https://terzisti-2a23f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "terzisti-2a23f",
  storageBucket: "terzisti-2a23f.firebasestorage.app",
  messagingSenderId: "304632997223",
  appId: "1:304632997223:web:0741bb6a9e643d8bacfbc2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const statoRef = ref(db,"stato");

// Nascondi tutto fino a verifica offline
document.documentElement.style.display = "none";

// Controllo modalità offline
get(statoRef).then(snap=>{
  if(snap.exists() && snap.val().attivita === false){
    window.location.href="🖕.html";
  } else {
    document.documentElement.style.display = "block";
  }
}).catch(err=>{
  console.error("Errore nel controllo offline:", err);
  document.documentElement.style.display = "block";
});

// Login obbligatorio
onAuthStateChanged(auth,user=>{
  if(!user) window.location.href="login.html";
});

// Logout
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  if(confirm("Vuoi uscire dal sistema?")){
    await signOut(auth);
    window.location.href="login.html";
  }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
